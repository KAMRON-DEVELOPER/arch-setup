[meta]
version = 1
name = "Wallust Custom Theme"
description = "A personalized theme for Vicinae"
variant = "dark"
# icon = "icons/catppuccin-mocha.png"
inherits = "vicinae-dark"

[colors.core]
accent = "#2f6fed"
accent_foreground = "#ffffff"
background = "#000103"
foreground = "#F1E0DE"
secondary_background = "#000103"
border = "#3A3D41"

[colors.main_window]
border = "#747A82"
footer = { background = "colors.core.secondary_background" }

[colors.settings_window]
border = "#3A3D41"

[colors.accents]
blue = "#2f6fed"
green = "#3a9c61"
magenta = "#bc8cff"
orange = "#f0883e"
red = "#b9543b"
yellow = "#bfae78"
cyan = "#18a5b3"
purple = "#bc8cff"

# For now, shortcuts cannot have their own dedicated background
[colors.shortcut]
border = "colors.core.border"

[colors.text]
default = "colors.core.foreground"
muted = "#e8e6e1"
danger = "#b9543b"
success = "#3a9c61"
placeholder = "#e8e6e1"
selection = { background = "#2f6fed", foreground = "#ffffff" }

[colors.text.links]
default = "#2f6fed"
visited = "#bc8cff"

[colors.input]
border = "#3A3D41"
border_focus = "#2f6fed"
border_error = "#b9543b"

[colors.button.primary]
background = "#000103"
foreground = "#e8e6e1"
hover = { background = "#bb2e2e2e" }
focus = { outline = "colors.core.accent" }

[colors.list.item.hover]
foreground = "#e8e6e1"
secondary_foreground = "#e8e6e1"

[colors.list.item.selection]
background = "#3A3D41"
foreground = "#e8e6e1"
secondary_background = "#3A3D41"
secondary_foreground = "#e8e6e1"

[colors.grid.item]
background = "#242424"
hover = { outline = "#e8e6e1" }
selection = { outline = "#e8e6e1" }

[colors.scrollbars]
background = "#747A82"

[colors.loading]
bar = "#e8e6e1"     # shown right below the search bar when something is loading
spinner = "#e8e6e1" # used by dynamic toasts
