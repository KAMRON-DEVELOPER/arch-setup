# Vicinae Matugen Theme Template
# Used LLM for initial generation, then modified to a satisfactory level

[meta]
name = "Matugen"
description = "Material You theme generated by Matugen - dark variant"
variant = "dark"

# ============================================================================
# Core Colors
# ============================================================================

[colors.core]
accent = "#a9d292"
accent_foreground = "#163808"
background = "#11140f"
foreground = "#e1e4d9"
secondary_background = "#1d211a"
border = "#43483e"

# ============================================================================
# Window Borders
# ============================================================================

[colors.main_window]
border = "#43483e"

[colors.settings_window]
border = "#8d9287"

# ============================================================================
# Accent Palette
# ============================================================================

[colors.accents]
blue = "#a9d292"
green = "#a0cfd0"
magenta = "#bccbb0"
orange = { name = "#ffb4ab", lighter = 40 }
red = "#ffb4ab"
yellow = { name = "#a0cfd0", lighter = 80 }
cyan = { name = "#a9d292", lighter = 50 }
purple = "#bccbb0"

# ============================================================================
# Text System
# ============================================================================

[colors.text]
default = "#e1e4d9"
muted = "#c3c8bb"
danger = "#ffb4ab"
success = "#a0cfd0"
placeholder = { name = "#c3c8bb", opacity = 0.6 }

[colors.text.selection]
background = "#a9d292"
foreground = "#163808"

[colors.text.links]
default = "#a9d292"
visited = { name = "#a0cfd0", darker = 20 }

# ============================================================================
# Input Fields
# ============================================================================

[colors.input]
border = "#8d9287"
border_focus = "#a9d292"
border_error = "#ffb4ab"

# ============================================================================
# Buttons
# ============================================================================

[colors.button.primary]
background = "#282b24"
foreground = "#e1e4d9"

[colors.button.primary.hover]
background = "#32362f"  

[colors.button.primary.focus]
outline = "#a9d292"

# ============================================================================
# Lists
# ============================================================================

[colors.list.item.hover]
background = { name = "#2c4f1d", opacity = 0.25 }  
foreground = "#e1e4d9"

[colors.list.item.selection]
background = { name = "#2c4f1d", opacity = 0.50 }
foreground = "#c4efac"
secondary_background = "#2c4f1d"
secondary_foreground = "#c4efac"

# ============================================================================
# Grid Items
# ============================================================================

[colors.grid.item]
background = "#1d211a"

[colors.grid.item.hover]
outline = { name = "#bccbb0", opacity = 0.8 }

[colors.grid.item.selection]
outline = { name = "#a9d292" }

# ============================================================================
# Scrollbars
# ============================================================================

[colors.scrollbars]
background = { name = "#a9d292", opacity = 0.2 }

# ============================================================================
# Loading States
# ============================================================================

[colors.loading]
bar = "#a9d292"
spinner = "#a9d292"
