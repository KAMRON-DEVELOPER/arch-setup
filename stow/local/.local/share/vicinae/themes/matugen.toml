# Vicinae Matugen Theme Template
# Used LLM for initial generation, then modified to a satisfactory level

[meta]
name = "Matugen"
description = "Material You theme generated by Matugen - dark variant"
variant = "dark"

# ============================================================================
# Core Colors
# ============================================================================

[colors.core]
accent = "#b7c4ff"
accent_foreground = "#1f2d61"
background = "#121318"
foreground = "#e3e1e9"
secondary_background = "#1f1f25"
border = "#45464f"

# ============================================================================
# Window Borders
# ============================================================================

[colors.main_window]
border = "#45464f"

[colors.settings_window]
border = "#90909a"

# ============================================================================
# Accent Palette
# ============================================================================

[colors.accents]
blue = "#b7c4ff"
green = "#e4bad9"
magenta = "#c2c5dd"
orange = { name = "#ffb4ab", lighter = 40 }
red = "#ffb4ab"
yellow = { name = "#e4bad9", lighter = 80 }
cyan = { name = "#b7c4ff", lighter = 50 }
purple = "#c2c5dd"

# ============================================================================
# Text System
# ============================================================================

[colors.text]
default = "#e3e1e9"
muted = "#c6c5d0"
danger = "#ffb4ab"
success = "#e4bad9"
placeholder = { name = "#c6c5d0", opacity = 0.6 }

[colors.text.selection]
background = "#b7c4ff"
foreground = "#1f2d61"

[colors.text.links]
default = "#b7c4ff"
visited = { name = "#e4bad9", darker = 20 }

# ============================================================================
# Input Fields
# ============================================================================

[colors.input]
border = "#90909a"
border_focus = "#b7c4ff"
border_error = "#ffb4ab"

# ============================================================================
# Buttons
# ============================================================================

[colors.button.primary]
background = "#292a2f"
foreground = "#e3e1e9"

[colors.button.primary.hover]
background = "#34343a"  

[colors.button.primary.focus]
outline = "#b7c4ff"

# ============================================================================
# Lists
# ============================================================================

[colors.list.item.hover]
background = { name = "#364379", opacity = 0.25 }  
foreground = "#e3e1e9"

[colors.list.item.selection]
background = { name = "#364379", opacity = 0.50 }
foreground = "#dde1ff"
secondary_background = "#364379"
secondary_foreground = "#dde1ff"

# ============================================================================
# Grid Items
# ============================================================================

[colors.grid.item]
background = "#1f1f25"

[colors.grid.item.hover]
outline = { name = "#c2c5dd", opacity = 0.8 }

[colors.grid.item.selection]
outline = { name = "#b7c4ff" }

# ============================================================================
# Scrollbars
# ============================================================================

[colors.scrollbars]
background = { name = "#b7c4ff", opacity = 0.2 }

# ============================================================================
# Loading States
# ============================================================================

[colors.loading]
bar = "#b7c4ff"
spinner = "#b7c4ff"
