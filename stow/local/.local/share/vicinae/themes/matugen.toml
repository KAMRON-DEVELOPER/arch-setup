# Vicinae Matugen Theme Template
# Used LLM for initial generation, then modified to a satisfactory level

[meta]
name = "Matugen"
description = "Material You theme generated by Matugen - dark variant"
variant = "dark"

# ============================================================================
# Core Colors
# ============================================================================

[colors.core]
accent = "#86d1e9"
accent_foreground = "#003642"
background = "#0f1416"
foreground = "#dee3e6"
secondary_background = "#1b2022"
border = "#40484b"

# ============================================================================
# Window Borders
# ============================================================================

[colors.main_window]
border = "#40484b"

[colors.settings_window]
border = "#899296"

# ============================================================================
# Accent Palette
# ============================================================================

[colors.accents]
blue = "#86d1e9"
green = "#c1c4eb"
magenta = "#b2cad3"
orange = { name = "#ffb4ab", lighter = 40 }
red = "#ffb4ab"
yellow = { name = "#c1c4eb", lighter = 80 }
cyan = { name = "#86d1e9", lighter = 50 }
purple = "#b2cad3"

# ============================================================================
# Text System
# ============================================================================

[colors.text]
default = "#dee3e6"
muted = "#bfc8cc"
danger = "#ffb4ab"
success = "#c1c4eb"
placeholder = { name = "#bfc8cc", opacity = 0.6 }

[colors.text.selection]
background = "#86d1e9"
foreground = "#003642"

[colors.text.links]
default = "#86d1e9"
visited = { name = "#c1c4eb", darker = 20 }

# ============================================================================
# Input Fields
# ============================================================================

[colors.input]
border = "#899296"
border_focus = "#86d1e9"
border_error = "#ffb4ab"

# ============================================================================
# Buttons
# ============================================================================

[colors.button.primary]
background = "#252b2d"
foreground = "#dee3e6"

[colors.button.primary.hover]
background = "#303638"  

[colors.button.primary.focus]
outline = "#86d1e9"

# ============================================================================
# Lists
# ============================================================================

[colors.list.item.hover]
background = { name = "#004e5e", opacity = 0.25 }  
foreground = "#dee3e6"

[colors.list.item.selection]
background = { name = "#004e5e", opacity = 0.50 }
foreground = "#b2ebff"
secondary_background = "#004e5e"
secondary_foreground = "#b2ebff"

# ============================================================================
# Grid Items
# ============================================================================

[colors.grid.item]
background = "#1b2022"

[colors.grid.item.hover]
outline = { name = "#b2cad3", opacity = 0.8 }

[colors.grid.item.selection]
outline = { name = "#86d1e9" }

# ============================================================================
# Scrollbars
# ============================================================================

[colors.scrollbars]
background = { name = "#86d1e9", opacity = 0.2 }

# ============================================================================
# Loading States
# ============================================================================

[colors.loading]
bar = "#86d1e9"
spinner = "#86d1e9"
