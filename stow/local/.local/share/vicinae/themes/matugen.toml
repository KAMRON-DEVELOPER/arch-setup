# Vicinae Matugen Theme Template
# Used LLM for initial generation, then modified to a satisfactory level

[meta]
name = "Matugen"
description = "Material You theme generated by Matugen - dark variant"
variant = "dark"

# ============================================================================
# Core Colors
# ============================================================================

[colors.core]
accent = "#add28e"
accent_foreground = "#1b3704"
background = "#11140e"
foreground = "#e2e3d9"
secondary_background = "#1e211a"
border = "#44483e"

# ============================================================================
# Window Borders
# ============================================================================

[colors.main_window]
border = "#44483e"

[colors.settings_window]
border = "#8e9286"

# ============================================================================
# Accent Palette
# ============================================================================

[colors.accents]
blue = "#add28e"
green = "#a0cfce"
magenta = "#becbae"
orange = { name = "#ffb4ab", lighter = 40 }
red = "#ffb4ab"
yellow = { name = "#a0cfce", lighter = 80 }
cyan = { name = "#add28e", lighter = 50 }
purple = "#becbae"

# ============================================================================
# Text System
# ============================================================================

[colors.text]
default = "#e2e3d9"
muted = "#c4c8ba"
danger = "#ffb4ab"
success = "#a0cfce"
placeholder = { name = "#c4c8ba", opacity = 0.6 }

[colors.text.selection]
background = "#add28e"
foreground = "#1b3704"

[colors.text.links]
default = "#add28e"
visited = { name = "#a0cfce", darker = 20 }

# ============================================================================
# Input Fields
# ============================================================================

[colors.input]
border = "#8e9286"
border_focus = "#add28e"
border_error = "#ffb4ab"

# ============================================================================
# Buttons
# ============================================================================

[colors.button.primary]
background = "#282b24"
foreground = "#e2e3d9"

[colors.button.primary.hover]
background = "#33362f"  

[colors.button.primary.focus]
outline = "#add28e"

# ============================================================================
# Lists
# ============================================================================

[colors.list.item.hover]
background = { name = "#314f19", opacity = 0.25 }  
foreground = "#e2e3d9"

[colors.list.item.selection]
background = { name = "#314f19", opacity = 0.50 }
foreground = "#c8eea8"
secondary_background = "#314f19"
secondary_foreground = "#c8eea8"

# ============================================================================
# Grid Items
# ============================================================================

[colors.grid.item]
background = "#1e211a"

[colors.grid.item.hover]
outline = { name = "#becbae", opacity = 0.8 }

[colors.grid.item.selection]
outline = { name = "#add28e" }

# ============================================================================
# Scrollbars
# ============================================================================

[colors.scrollbars]
background = { name = "#add28e", opacity = 0.2 }

# ============================================================================
# Loading States
# ============================================================================

[colors.loading]
bar = "#add28e"
spinner = "#add28e"
