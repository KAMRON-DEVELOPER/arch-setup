# Vicinae Matugen Theme Template
# Used LLM for initial generation, then modified to a satisfactory level

[meta]
name = "Matugen"
description = "Material You theme generated by Matugen - dark variant"
variant = "dark"

# ============================================================================
# Core Colors
# ============================================================================

[colors.core]
accent = "#f6ecff"
accent_foreground = "#000000"
background = "#151218"
foreground = "#ffffff"
secondary_background = "#322f35"
border = "#c7c0cb"

# ============================================================================
# Window Borders
# ============================================================================

[colors.main_window]
border = "#c7c0cb"

[colors.settings_window]
border = "#f5edf9"

# ============================================================================
# Accent Palette
# ============================================================================

[colors.accents]
blue = "#f6ecff"
green = "#ffebee"
magenta = "#f6ecff"
orange = { name = "#ffece9", lighter = 40 }
red = "#ffece9"
yellow = { name = "#ffebee", lighter = 80 }
cyan = { name = "#f6ecff", lighter = 50 }
purple = "#f6ecff"

# ============================================================================
# Text System
# ============================================================================

[colors.text]
default = "#ffffff"
muted = "#ffffff"
danger = "#ffece9"
success = "#ffebee"
placeholder = { name = "#ffffff", opacity = 0.6 }

[colors.text.selection]
background = "#f6ecff"
foreground = "#000000"

[colors.text.links]
default = "#f6ecff"
visited = { name = "#ffebee", darker = 20 }

# ============================================================================
# Input Fields
# ============================================================================

[colors.input]
border = "#f5edf9"
border_focus = "#f6ecff"
border_error = "#ffece9"

# ============================================================================
# Buttons
# ============================================================================

[colors.button.primary]
background = "#3d3a40"
foreground = "#ffffff"

[colors.button.primary.hover]
background = "#49454c"  

[colors.button.primary.focus]
outline = "#f6ecff"

# ============================================================================
# Lists
# ============================================================================

[colors.list.item.hover]
background = { name = "#ceb8f9", opacity = 0.25 }  
foreground = "#ffffff"

[colors.list.item.selection]
background = { name = "#ceb8f9", opacity = 0.50 }
foreground = "#000000"
secondary_background = "#ceb8f9"
secondary_foreground = "#000000"

# ============================================================================
# Grid Items
# ============================================================================

[colors.grid.item]
background = "#322f35"

[colors.grid.item.hover]
outline = { name = "#f6ecff", opacity = 0.8 }

[colors.grid.item.selection]
outline = { name = "#f6ecff" }

# ============================================================================
# Scrollbars
# ============================================================================

[colors.scrollbars]
background = { name = "#f6ecff", opacity = 0.2 }

# ============================================================================
# Loading States
# ============================================================================

[colors.loading]
bar = "#f6ecff"
spinner = "#f6ecff"
