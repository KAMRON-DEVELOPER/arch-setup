windowrule {
    # Ignore maximize requests from all apps. You'll probably like this.
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    # Fix some dragging issues with XWayland
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

# Hyprland-run windowrule
windowrule {
    name = move-hyprland-run

    match:class = hyprland-run

    move = 20 monitor_h-120
    float = yes
}

# opacity rules
# Set opacity to 1.0 active, 1.0 inactive and 0.8 fullscreen
# windowrule = opacity 0.95 override 1.0 override 1.0 override, match:class firefox
windowrule = opacity 1 override 1.0 override 1.0 override, match:class code
windowrule = opacity 1 override 1.0 override 1.0 override, match:class code-insiders
windowrule = opacity 1 override 1.0 override 1.0 override, match:class dev.zed.Zed
