general {
  lock_cmd = hyprlock
}

listener {
  timeout = 300
  on-timeout = brightnessctl -s set 25
  on-resume = brightnessctl set 100%
}

listener {
  timeout = 600
  on-timeout = hyprlock
  on-resume = brightnessctl set 100%
}

listener {
  timeout = 1800
  on-timeout = systemctl sleep
  on-resume = hyprlock
}
