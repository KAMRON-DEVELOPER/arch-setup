[colors.primary]
background = "#050303"
# highlight command outputs
# color: nx time darker than cursor
foreground = "#716A69"

[colors.cursor]
cursor = "#7D7675"

[colors.selection]
text = "CellForeground"
# color: nnx time darker than cursor
background = "#3F3B3B"

[colors.normal]
black = "#000000"
# highlight prompt
# color: nx time darker than cursor
red = "#716A69"
# highlight commands
# color: cursor
green = "#7D7675"
# highlight ''/"" 
# color: cursor
yellow = "#7D7675"
# highlight --help
# color: cursor
blue = "#7D7675"
magenta = "#000000"
# highlight paths
# color: nx time darker than cursor
cyan = "#716A69"
white = "#000000"

[colors.bright]
# highlight zsh-autosuggestions
# color: 2nx time darker than cursor
black = "#645E5E"
red = "#d32c2c"
green = "#69cf2f"
yellow = "#caca31"
blue = "#2f50d1"
magenta = "#ffffff"
cyan = "#ffffff"
# highlight git branch and character
# color: cursor
white = "#7D7675"
