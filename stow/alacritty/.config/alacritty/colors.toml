[colors.primary]
background = "#1A1B1A"
# highlight command outputs
# color: nx time darker than cursor
foreground = "#D3AD80"

[colors.cursor]
cursor = "#EAC08E"

[colors.selection]
text = "CellForeground"
# color: nnx time darker than cursor
background = "#756047"

[colors.normal]
black = "#000000"
# highlight prompt
# color: nx time darker than cursor
red = "#D3AD80"
# highlight commands
# color: cursor
green = "#EAC08E"
# highlight ''/"" 
# color: cursor
yellow = "#EAC08E"
# highlight --help
# color: cursor
blue = "#EAC08E"
magenta = "#000000"
# highlight paths
# color: nx time darker than cursor
cyan = "#D3AD80"
white = "#000000"

[colors.bright]
# highlight zsh-autosuggestions
# color: 2nx time darker than cursor
black = "#BB9A72"
red = "#d32c2c"
green = "#69cf2f"
yellow = "#caca31"
blue = "#2f50d1"
magenta = "#ffffff"
cyan = "#ffffff"
# highlight git branch and character
# color: cursor
white = "#EAC08E"
