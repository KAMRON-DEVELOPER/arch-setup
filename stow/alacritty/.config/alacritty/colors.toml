[colors.primary]
background = "#47412B"
# highlight command outputs
# color: nx time darker than cursor
foreground = "#52687B"

[colors.cursor]
cursor = "#5B7389"

[colors.selection]
text = "CellForeground"
# color: nnx time darker than cursor
background = "#2E3A44"

[colors.normal]
black = "#000000"
# highlight prompt
# color: nx time darker than cursor
red = "#52687B"
# highlight commands
# color: cursor
green = "#5B7389"
# highlight ''/"" 
# color: cursor
yellow = "#5B7389"
# highlight --help
# color: cursor
blue = "#5B7389"
magenta = "#000000"
# highlight paths
# color: nx time darker than cursor
cyan = "#52687B"
white = "#000000"

[colors.bright]
# highlight zsh-autosuggestions
# color: 2nx time darker than cursor
black = "#495C6E"
red = "#d32c2c"
green = "#69cf2f"
yellow = "#caca31"
blue = "#2f50d1"
magenta = "#ffffff"
cyan = "#ffffff"
# highlight git branch and character
# color: cursor
white = "#5B7389"
