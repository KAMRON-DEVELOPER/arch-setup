[colors.primary]
background = "#020000"
# highlight command outputs
# color: nx time darker than cursor
foreground = "#D2DBA2"

[colors.cursor]
cursor = "#E9F3B4"

[colors.selection]
text = "CellForeground"
# color: nnx time darker than cursor
background = "#757A5A"

[colors.normal]
black = "#000000"
# highlight prompt
# color: nx time darker than cursor
red = "#D2DBA2"
# highlight commands
# color: cursor
green = "#E9F3B4"
# highlight ''/"" 
# color: cursor
yellow = "#E9F3B4"
# highlight --help
# color: cursor
blue = "#E9F3B4"
magenta = "#000000"
# highlight paths
# color: nx time darker than cursor
cyan = "#D2DBA2"
white = "#000000"

[colors.bright]
# highlight zsh-autosuggestions
# color: 2nx time darker than cursor
black = "#BAC290"
red = "#d32c2c"
green = "#69cf2f"
yellow = "#caca31"
blue = "#2f50d1"
magenta = "#ffffff"
cyan = "#ffffff"
# highlight git branch and character
# color: cursor
white = "#E9F3B4"
