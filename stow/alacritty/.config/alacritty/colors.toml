[colors.primary]
background = "#050300"
# highlight command outputs
# color: 1 time darker than cursor
foreground = "#202087"

[colors.cursor]
cursor = "#0000ff"

[colors.selection]
text = "CellForeground"
# color: 5 time darker than cursor
background = "#09092b"

[colors.normal]
black = "#000000"
# highlight prompt
# color: 1 time darker than cursor
red = "#202087"
# highlight commands
# color: cursor
green = "#0000ff"
# highlight git branch and character
# color: cursor
yellow = "#d41f1f"
blue = "#000000"
magenta = "#000000"
# highlight paths
# color: 1 time darker than cursor
cyan = "#202087"
white = "#000000"


[colors.bright]
# highlight zsh-autosuggestions
# color: 2 time darker than cursor
black = "#1a1a4e"
red = "#d32c2c"
green = "#69cf2f"
yellow = "#caca31"
blue = "#2f50d1"
magenta = "#ffffff"
cyan = "#ffffff"
# highlight git branch and character
# color: cursor
white = "#40ff00"


