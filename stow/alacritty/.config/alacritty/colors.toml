[colors.primary]
background = "#020000"
# highlight command outputs
# color: nx time darker than cursor
foreground = "#C1DB39"

[colors.cursor]
cursor = "#D6F33F"

[colors.selection]
text = "CellForeground"
# color: nnx time darker than cursor
background = "#6B7A20"

[colors.normal]
black = "#000000"
# highlight prompt
# color: nx time darker than cursor
red = "#C1DB39"
# highlight commands
# color: cursor
green = "#D6F33F"
# highlight ''/"" 
# color: cursor
yellow = "#D6F33F"
# highlight --help
# color: cursor
blue = "#D6F33F"
magenta = "#000000"
# highlight paths
# color: nx time darker than cursor
cyan = "#C1DB39"
white = "#000000"

[colors.bright]
# highlight zsh-autosuggestions
# color: 2nx time darker than cursor
black = "#ABC232"
red = "#d32c2c"
green = "#69cf2f"
yellow = "#caca31"
blue = "#2f50d1"
magenta = "#ffffff"
cyan = "#ffffff"
# highlight git branch and character
# color: cursor
white = "#D6F33F"
