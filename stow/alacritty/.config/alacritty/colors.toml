[colors.primary]
background = "#070C18"
# highlight command outputs
# color: nx time darker than cursor
foreground = "#58718A"

[colors.cursor]
cursor = "#6E8DAC"

[colors.selection]
text = "CellForeground"
# color: nnx time darker than cursor
background = "#374656"

[colors.normal]
black = "#000000"
# highlight prompt
# color: nx time darker than cursor
red = "#58718A"
# highlight commands
# color: cursor
green = "#6E8DAC"
# highlight ''/"" 
# color: cursor
yellow = "#8D8686"
# highlight --help
# color: cursor
blue = "#6E8DAC"
magenta = "#000000"
# highlight paths
# color: nx time darker than cursor
cyan = "#425567"
white = "#ffffff"

[colors.bright]
# highlight zsh-autosuggestions
# color: 2nx time darker than cursor
black = "#425567"
red = "#d32c2c"
green = "#69cf2f"
yellow = "#caca31"
blue = "#2f50d1"
magenta = "#ffffff"
cyan = "#ffffff"
# highlight git branch and character
# color: cursor
white = "#6E8DAC"
