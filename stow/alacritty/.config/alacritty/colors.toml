[colors.primary]
background = "#020408"
# highlight command outputs
# color: nx time darker than cursor
foreground = "#838262"

[colors.cursor]
cursor = "#92916D"

[colors.selection]
text = "CellForeground"
# color: nnx time darker than cursor
background = "#494837"

[colors.normal]
black = "#000000"
# highlight prompt
# color: nx time darker than cursor
red = "#838262"
# highlight commands
# color: cursor
green = "#92916D"
# highlight ''/"" 
# color: cursor
yellow = "#92916D"
# highlight --help
# color: cursor
blue = "#92916D"
magenta = "#000000"
# highlight paths
# color: nx time darker than cursor
cyan = "#838262"
white = "#000000"

[colors.bright]
# highlight zsh-autosuggestions
# color: 2nx time darker than cursor
black = "#757457"
red = "#d32c2c"
green = "#69cf2f"
yellow = "#caca31"
blue = "#2f50d1"
magenta = "#ffffff"
cyan = "#ffffff"
# highlight git branch and character
# color: cursor
white = "#92916D"
