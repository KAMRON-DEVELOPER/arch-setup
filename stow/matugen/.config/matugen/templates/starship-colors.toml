[directory]
style = "fg:color3"
format = "[$path ]($style)"
truncation_length = 4
truncate_to_repo = false
fish_style_pwd_dir_length = 1

[time]
format = "[$time](fg:color3) "
disabled = true
time_format = "%R" # Hour:Minute Format

[git_branch]
# symbol = '­şî▒ '
# symbol = '´Éİ '
symbol = ''
style = 'fg:color1'
format = "[$symbol$branch(:$remote_branch)]($style) "

[git_commit]
tag_symbol = ' ´ÉÆ '

[git_metrics]
disabled = true

[git_status]
conflicted = '[=${count}](bright-red)'
ahead = '[Ôçí${count}](bright-green)'
behind = '[Ôçú${count}](bright-green)'
diverged = '[ÔçòÔçí${ahead_count}Ôçú${behind_count}](bright-green)'
up_to_date = ''
untracked = '[?${count}](bright-blue)'
stashed = ''
modified = '[!${count}](bright-yellow)'
staged = '[+$count](bright-green)'
renamed = '[┬╗${count}](bright-yellow)'
deleted = '[Ô£İ${count}](bright-red)'
format = "([$ahead_behind]($style) )([$conflicted]($style) )([$stashed]($style) )([$deleted]($style) )([$renamed]($style) )([$modified]($style) )([$typechanged]($style) )([$staged]($style) )([$untracked]($style) )"

