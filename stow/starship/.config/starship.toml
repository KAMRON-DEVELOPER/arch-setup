add_newline = false

palette = 'colors'

[palettes.colors]
mustard = '#af8700' # example
color1 = '#b7c4ff'
color2 = '#1f2d61'
color3 = '#c6c5d0'
color4 = '#1f1f25'
color5 = '#1f2d61'
color6 = '#121318'
color7 = '#121318'
color8 = '#b7c4ff'
color9 = '#e4bad9'

[line_break]
disabled = true

[os]
disabled = true

[os.symbols]
Linux = ' '
Arch = ' '
Bluefin = ' '
Fedora = ' '
Ubuntu = ' '
Debian = ' '
Pop = ' '
NixOS = ' '
FreeBSD = ' '
Kali = ' '
Garuda = ' '
Gentoo = ' '
AlmaLinux = ' '
Alpine = ' '
CachyOS = ' '
CentOS = ' '
DragonFly = ' '
Elementary = ' '
EndeavourOS = ' '
Manjaro = ' '
Mariner = ' '
MidnightBSD = ' '
Mint = ' '
NetBSD = ' '
Nobara = ' '
OpenBSD = ' '
OpenCloudOS = ' '
openEuler = ' '
openSUSE = ' '
OracleLinux = '󰺡 '
PikaOS = ' '
Raspbian = ' '
Redhat = '󱄛 '
RedHatEnterprise = '󱄛 '
Redox = '󰀘 '
RockyLinux = ' '
Solus = ' '
SUSE = ' '
Ultramarine = ' '
Uos = ' '
Void = ' '
Zorin = ' '
Macos = ' '
Windows = '󰍲 '

[character]
success_symbol = '[❯](color3 bold)'
error_symbol = '[❯](@{error})'
vimcmd_symbol = '[❮](#f9e2af)'

# [directory.substitutions]
# "Documents" = "󰈙 "
# "Downloads" = " "
# "Music" = " "
# "Pictures" = " "

[directory]
style = "fg:color3"
format = "[$path ]($style)"
truncation_length = 4
truncate_to_repo = false
fish_style_pwd_dir_length = 1

[time]
format = "[$time](fg:color3) "
disabled = true
time_format = "%R" # Hour:Minute Format

[git_branch]
# symbol = '🌱 '
# symbol = ' '
symbol = ''
style = 'fg:color1'
format = "[$symbol$branch(:$remote_branch)]($style) "

[git_commit]
tag_symbol = '  '

[git_metrics]
disabled = true

[git_status]
conflicted = '[=${count}](bright-red)'
ahead = '[⇡${count}](bright-green)'
behind = '[⇣${count}](bright-green)'
diverged = '[⇕⇡${ahead_count}⇣${behind_count}](bright-green)'
up_to_date = ''
untracked = '[?${count}](bright-blue)'
stashed = ''
modified = '[!${count}](bright-yellow)'
staged = '[+$count](bright-green)'
renamed = '[»${count}](bright-yellow)'
deleted = '[✘${count}](bright-red)'
format = "([$ahead_behind]($style) )([$conflicted]($style) )([$stashed]($style) )([$deleted]($style) )([$renamed]($style) )([$modified]($style) )([$typechanged]($style) )([$staged]($style) )([$untracked]($style) )"

[package]
disabled = true
symbol = '󰏗 '

[c]
symbol = ' '
format = "[$symbol]($style)"

[python]
symbol = ' '
format = "[${symbol}](fg:color3)[( ${virtualenv})](fg:color1) "

[nodejs]
symbol = ' '
format = "[$symbol]($style)"

[rust]
symbol = '󱘗 '
format = "[$symbol]($style)"

[golang]
symbol = ' '
format = "[$symbol]($style)"

[zig]
symbol = " "
format = "[$symbol]($style)"

[dart]
symbol = ' '
format = "[$symbol]($style)"

[lua]
