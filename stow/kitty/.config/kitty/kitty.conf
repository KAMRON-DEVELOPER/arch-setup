font_family      family='JetBrainsMono Nerd Font' postscript_name=JetBrainsMonoNF-Regular
bold_font        auto
italic_font      auto
bold_italic_font auto

font_size 11.0

cursor_shape beam
cursor_shape_unfocused hollow

scrollback_lines 2000

scrollbar_width 0.5
scrollbar_hover_width 1
scrollbar_handle_opacity 0
scrollbar_radius 0.25

scrollbar_track_opacity 0.05
scrollbar_track_hover_opacity 0.05

wheel_scroll_multiplier 5.0
touch_scroll_multiplier 2.0

copy_on_select no

remember_window_size  yes
initial_window_width  640
initial_window_height 400

# window_margin_width 0
# single_window_margin_width 0
# window_padding_width -2
# single_window_padding_width -2

tab_bar_edge top
# fade, slant, separator, powerline, hidden
tab_bar_style slant

hide_window_decorations true

dynamic_background_opacity yes
background_opacity 0.9
background_blur 12


# BEGIN_KITTY_THEME
# GitHub Dark
include current-theme.conf
# END_KITTY_THEME

map ctrl+alt+1 goto_tab 1
map ctrl+alt+2 goto_tab 2
map f1 clear_terminal clear active

map ctrl+left resize_window narrower
map ctrl+right resize_window wider
map ctrl+up resize_window taller
map ctrl+down resize_window shorter 3