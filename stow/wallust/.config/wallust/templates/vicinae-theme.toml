[meta]
version = 1
name = "Wallust Custom Theme"
description = "A personalized theme for Vicinae"
variant = "dark"
# icon = "icons/catppuccin-mocha.png"
inherits = "vicinae-dark"

[colors.wallust]
cursor = "{{cursor}}"
background = "{{background}}"
foreground = "{{foreground}}"
color0 = "{{color0}}"
color1 = "{{color1}}"
color2 = "{{color2}}"
color3 = "{{color3}}"
color4 = "{{color4}}"
color5 = "{{color5}}"
color6 = "{{color6}}"
color7 = "{{color7}}"
color8 = "{{color8}}"
color9 = "{{color9}}"
color10 = "{{color10}}"
color11 = "{{color11}}"
color12 = "{{color12}}"
color13 = "{{color13}}"
color14 = "{{color14}}"
color15 = "{{color15}}"

[colors.core]
accent = "colors.wallust.color0"
accent_foreground = "#ffffff"
background = "colors.wallust.background"
foreground = "colors.wallust.foreground"
secondary_background = "#242424"
border = "#2e2e2e"

[colors.main_window]
border = "#2e2e2e"
footer = { background = "colors.core.secondary_background" }

[colors.settings_window]
border = "#2e2e2e"

[colors.accents]
blue = "#2f6fed"
green = "#3a9c61"
magenta = "#bc8cff"
orange = "#f0883e"
red = "#b9543b"
yellow = "#bfae78"
cyan = "#18a5b3"
purple = "#bc8cff"

# For now, shortcuts cannot have their own dedicated background
[colors.shortcut]
border = "colors.core.border"

[colors.text]
default = "colors.core.foreground"
muted = "#e8e6e1"
danger = "#b9543b"
success = "#3a9c61"
placeholder = "#e8e6e1"
selection = { background = "#2f6fed", foreground = "#ffffff" }

[colors.text.links]
default = "#2f6fed"
visited = "#bc8cff"

[colors.input]
border = "#2e2e2e"
border_focus = "#2f6fed"
border_error = "#b9543b"

[colors.button.primary]
background = "#2e2e2e"
foreground = "#e8e6e1"
hover = { background = "#bb2e2e2e" }
focus = { outline = "colors.core.accent" }

[colors.list.item.hover]
foreground = "#e8e6e1"
secondary_foreground = "#e8e6e1"

[colors.list.item.selection]
background = "#2e2e2e"
foreground = "#e8e6e1"
secondary_background = "#2e2e2e"
secondary_foreground = "#e8e6e1"

[colors.grid.item]
background = "#242424"
hover = { outline = "#e8e6e1" }
selection = { outline = "#e8e6e1" }

[colors.scrollbars]
background = "#2e2e2e"

[colors.loading]
bar = "#e8e6e1"     # shown right below the search bar when something is loading
spinner = "#e8e6e1" # used by dynamic toasts
