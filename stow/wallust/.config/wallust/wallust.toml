# full:
#   lch + harddark = (Dark Cyan, Dark Navy Black / Bright Cyan)
#   lchmixed + dark = (Dark Grey / Bright Teal) - darker
#   lab + harddark = (Dark Cyan, Dark Navy Black / Bright Cyan)
#   lchmixed + harddark = (Black / Bright Cyan)
#   lab + saliencedarkbalanced, saliencedarkdistributed = (Black / Bold Teal)
#   lab,lch,lchmixed + saliencedarkbalanced, saliencedarkdistributed = (Black / Bold Teal)
# wal:
#   lch + harddark = (Dark Teal / Bright Teal)
#   lchmixed + dark = (Dark Grey / Bright Teal) - lighter
#   lab + harddark = (Black / Bright Green)
#   lchmixed + harddark = (Dark Teal / Bright Green)
#   lch,lchmixed + saliencedarkbalanced, saliencedarkdistributed = (Black / Bold Teal)
backend = "wal"
color_space = "lch"
palette = "harddark"
check_contrast = true

[templates]
palette = { template = 'palette.css', dst = '~/.config/wallust/palette/palette.css' }
waybar = { template = 'waybar-colors.css', target = '~/.config/waybar/colors.css' }
# ashell = { template = 'ashell-config.toml', dst = '~/.config/ashell/config.toml' }
# wofi = { template = 'wofi-colors.css', dst = '~/.config/wofi/colors.css' }
vicinae = { src = 'vicinae-theme.toml', dst = '~/.local/share/vicinae/themes/wallust-theme.toml' }
alacritty = { src = 'alacritty-colors.toml', target = '~/.config/alacritty/colors.toml' }
kitty = { src='kitty.conf', dst='~/.config/kitty/colors.conf'}
hyprland-conf = { src = 'hyprland-colors.conf', target = '~/.config/hypr/colors.conf' }
hyprland-lua = { src = 'hyprland-colors.lua', dst = '~/.config/hypr/colors.lua' }
